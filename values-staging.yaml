# values-staging.yaml
replicaCount: 1

image:
  tag: ""  # set by CI

spring:
  profile: staging

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  hosts:
    - host: finbridge-staging.bk.rw
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: finbridge-staging-tls
      hosts:
        - finbridge-staging.bk.rw

probes:
  liveness:
    initialDelaySeconds: 90     # slower startup in staging is ok
  readiness:
    initialDelaySeconds: 45
